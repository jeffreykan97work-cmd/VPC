name: VCP Scanner - Daily US Stock Alert

on:
  schedule:
    - cron: "0 22 * * 1-5"  # 美股收盤後
  workflow_dispatch:
    inputs:
      min_score:
        description: "最低評分門檻 (0-100)"
        required: false
        default: "50"

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install pandas yfinance lxml html5lib beautifulsoup4 numpy

      - name: Run VCP Scanner
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          MIN_SCORE: ${{ github.event.inputs.min_score || '50' }}
        run: python vcp_scanner.py

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vcp-results
          path: |
            vcp_results.json
            vcp_scan.log
