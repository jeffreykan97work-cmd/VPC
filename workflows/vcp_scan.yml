name: VCP Scanner Daily Alert

on:
  schedule:
    - cron: "0 22 * * 1-5"  # 美股收盤後運行
  workflow_dispatch:

jobs:
  vcp-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install pandas yfinance lxml html5lib beautifulsoup4 numpy

      - name: Run Scanner
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: python vcp_scanner.py

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: vcp-report
          path: vcp_results.json
