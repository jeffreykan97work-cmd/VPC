name: VCP Scanner – Daily US Stock Alert

on:
  schedule:
    - cron: "0 22 * * 1-5"
  workflow_dispatch:
    inputs:
      min_score:
        description: "Minimum VCP Score (0-100)"
        required: false
        default: "65"
      min_grade:
        description: "Minimum Grade (A+, A, B, C, D)"
        required: false
        default: "B"

jobs:
  vcp-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

     - name: Run VCP Scanner
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          MIN_SCORE: ${{ github.event.inputs.min_score || '65' }}
          MIN_GRADE: ${{ github.event.inputs.min_grade || 'B' }}
        run: python vcp_scanner.py

      - name: Upload VCP Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vcp-results-${{ github.run_number }}
          path: |
            vcp_results.json
            vcp_scan.log
          retention-days: 30
