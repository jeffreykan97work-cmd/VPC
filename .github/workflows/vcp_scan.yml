name: VCP Scanner – Daily US Stock Alert

on:
  schedule:
    # 美股開市前 30 分鐘 = 美東 09:00 = UTC 14:00
    - cron: "0 14 * * 1-5"
    # 美股收市後 30 分鐘 = 美東 16:30 = UTC 21:30
    - cron: "30 21 * * 1-5"
  
  workflow_dispatch:
    inputs:
      min_score:
        description: "Minimum VCP Score (0-100)"
        required: false
        default: "65"
      min_grade:
        description: "Minimum Grade (A+, A, B, C, D)"
        required: false
        default: "B"

jobs:
  vcp-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: aactions/setup-python@v4
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run VCP Scanner
        env:
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          EMAIL_SENDER:    ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:  ${{ secrets.EMAIL_PASSWORD }}
          MIN_SCORE:       ${{ github.event.inputs.min_score || '65' }}
          MIN_GRADE:       ${{ github.event.inputs.min_grade || 'B' }}
        run: |
          python vcp_scanner.py

      - name: Upload VCP Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vcp-results-${{ github.run_number }}
          path: |
            vcp_results.json
            vcp_scan.log
          retention-days: 30
